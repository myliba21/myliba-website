# ──────────────────────────────────────────────────────────────
# Myliba – Nginx configuration (WordPress only)
# ──────────────────────────────────────────────────────────────

upstream wordpress {
    server wordpress:80;
}

# Rate-limit zone: maks 20 istek/sn per IP (form gönderimlerine karşı)
limit_req_zone $binary_remote_addr zone=myliba_contact:10m rate=20r/s;

# ──────────────────────────────────────────────────────────────
# HTTP → HTTPS yönlendirme (production'da aktif edin)
# ──────────────────────────────────────────────────────────────
# server {
#     listen 80;
#     server_name myliba.com www.myliba.com;
#     return 301 https://$host$request_uri;
# }

# ──────────────────────────────────────────────────────────────
# Ana sunucu bloğu
# ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # HTTPS aktifse bu bloğu kullanın:
    # listen 443 ssl http2;
    # server_name myliba.com www.myliba.com;
    # ssl_certificate     /etc/letsencrypt/live/myliba.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/myliba.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # ── Güvenlik başlıkları ──────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "geolocation=(), microphone=()"    always;
    # HSTS – yalnızca HTTPS aktifken açın:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Statik dosyalar için önbellek ────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|otf)$ {
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            30d;
        add_header         Cache-Control "public, no-transform";
        access_log         off;
    }

    # ── WordPress uploads ────────────────────────────────────
    location /wp-content/uploads/ {
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            7d;
        add_header         Cache-Control "public, no-transform";
    }

    # ── Admin-post (form gönderim) — rate limiting ───────────
    location = /wp-admin/admin-post.php {
        limit_req zone=myliba_contact burst=5 nodelay;
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WordPress admin ──────────────────────────────────────
    location /wp-admin/ {
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WordPress login ──────────────────────────────────────
    location = /wp-login.php {
        # IP kısıtlaması (opsiyonel, kendi IP'nizi ekleyin):
        # allow 1.2.3.4;
        # deny all;
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── XML-RPC engelle (güvenlik) ───────────────────────────
    location = /xmlrpc.php {
        deny all;
        return 444;
    }

    # ── Gizli dosyalara erişimi engelle ─────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Tüm diğer istekler → WordPress ──────────────────────
    location / {
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
